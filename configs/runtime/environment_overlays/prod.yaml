# Production Environment Overlay
overlay:
  environment: prod
  description: "Production environment. Maximum strictness. All governance gates enforced. Strict audit chain required."
  strictness:
    enforce_all_governance_gates: true
    allow_auto_continue_on_warn: false
    require_policy_acknowledgment: true
    strict_audit_chain: true
  retries:
    max_retries_override: 1
  block_rules:
    blocked_tools: []
    blocked_actions: []
    blocked_stage_classes: [bootstrap, recovery]
  ui_defaults:
    default_ui_mode: three_panel_review_workspace
    default_interaction_mode: review_and_approve
    default_token_mode: compact
